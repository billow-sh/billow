syntax = "proto3";

package billow.api.v1;

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
}

service WorkloadService {
  rpc Submit(SubmitWorkloadRequest) returns (WorkloadResponse);
  rpc Get(GetWorkloadRequest) returns (WorkloadResponse);
  rpc Start(StartWorkloadRequest) returns (WorkloadResponse);
  rpc Stop(StopWorkloadRequest) returns (WorkloadResponse);
  rpc Delete(DeleteWorkloadRequest) returns (WorkloadResponse);
  rpc GetLogs(GetWorkloadLogsRequest) returns (GetWorkloadLogsResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}

enum WorkloadKind {
  WORKLOAD_KIND_UNSPECIFIED = 0;
  WORKLOAD_KIND_ONCE = 1;
  WORKLOAD_KIND_SERVICE = 2;
}

enum DesiredState {
  DESIRED_STATE_UNSPECIFIED = 0;
  DESIRED_STATE_RUNNING = 1;
  DESIRED_STATE_STOPPED = 2;
  DESIRED_STATE_DELETED = 3;
}

enum ActualState {
  ACTUAL_STATE_UNSPECIFIED = 0;
  ACTUAL_STATE_ACCEPTED = 1;
  ACTUAL_STATE_STARTING = 2;
  ACTUAL_STATE_RUNNING = 3;
  ACTUAL_STATE_STOPPING = 4;
  ACTUAL_STATE_STOPPED = 5;
  ACTUAL_STATE_FAILED = 6;
  ACTUAL_STATE_DELETED = 7;
  ACTUAL_STATE_CREATING = 8;
}

message SubmitWorkloadRequest {
  WorkloadKind kind = 1;
  string image = 2;
}

message GetWorkloadRequest {
  string workload_id = 1;
}

message StartWorkloadRequest {
  string workload_id = 1;
}

message StopWorkloadRequest {
  string workload_id = 1;
}

message DeleteWorkloadRequest {
  string workload_id = 1;
}

message GetWorkloadLogsRequest {
  string workload_id = 1;
}

message WorkloadResponse {
  string workload_id = 1;
  WorkloadKind kind = 2;
  string image = 3;
  DesiredState desired_state = 4;
  ActualState actual_state = 5;
  string runtime_task_id = 6;
  optional uint32 exit_code = 7;
  string error = 8;
  int64 created_at_unix_secs = 9;
  int64 updated_at_unix_secs = 10;
}

message GetWorkloadLogsResponse {
  string workload_id = 1;
  bytes stdout = 2;
  bytes stderr = 3;
  bool stdout_truncated = 4;
  bool stderr_truncated = 5;
}
